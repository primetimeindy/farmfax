app = "farmfax-api"
primary_region = "dfw"

[build]
  dockerfile = "Dockerfile"

[env]
  HOST = "0.0.0.0"
  FARMFAX_ALLOWED_ORIGIN = "https://primetimeindy.github.io"

[http_service]
  internal_port = 8787
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
